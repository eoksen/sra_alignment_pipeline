name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pipeline-check:
    name: Pipeline syntax check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nextflow
        uses: nf-core/setup-nextflow@v2
        with:
          version: '23.04.0'

      - name: Verify pipeline parses and --help works
        run: nextflow run main.nf --help -ansi-log false

      - name: Verify manifest validation failures are readable
        run: |
          assert_contains() {
            local haystack="$1"
            local needle="$2"
            local label="$3"
            if [[ "${haystack}" != *"${needle}"* ]]; then
              echo "Expected ${label} output to contain: ${needle}" >&2
              echo "Actual output:" >&2
              echo "${haystack}" >&2
              exit 1
            fi
          }

          bad_json="$(mktemp)"
          printf '{bad json\n' > "${bad_json}"
          if nextflow_output="$(nextflow run main.nf --help --image_manifest "${bad_json}" -ansi-log false 2>&1)"; then
            echo "Expected malformed manifest check to fail." >&2
            exit 1
          fi
          assert_contains "${nextflow_output}" "Invalid container image manifest" "malformed manifest"

          non_object_manifest="$(mktemp)"
          printf '[1, 2, 3]\n' > "${non_object_manifest}"
          if nextflow_output="$(nextflow run main.nf --help --image_manifest "${non_object_manifest}" -ansi-log false 2>&1)"; then
            echo "Expected top-level non-object manifest check to fail." >&2
            exit 1
          fi
          assert_contains "${nextflow_output}" "top-level JSON value must be an object" "top-level non-object manifest"

          missing_defaults="$(mktemp)"
          cat > "${missing_defaults}" <<'JSON'
          {"images":{"aria2":{"runtime_name":"aria2-sra-download","version":"1.37.0","build":{"enabled":true,"dockerfile":"dockerfiles/multiarch/aria2/Dockerfile","context":"dockerfiles/multiarch/aria2"}}}}
          JSON
          if nextflow_output="$(nextflow run main.nf --help --image_manifest "${missing_defaults}" -ansi-log false 2>&1)"; then
            echo "Expected missing-defaults manifest check to fail." >&2
            exit 1
          fi
          assert_contains "${nextflow_output}" "defaults must be an object" "missing defaults manifest"

          missing_required_image="$(mktemp)"
          cat > "${missing_required_image}" <<'JSON'
          {"defaults":{"registry":"docker.io","namespace":"eoksen"},"images":{"aria2":{"runtime_name":"aria2-sra-download","version":"1.37.0","build":{"enabled":true,"dockerfile":"dockerfiles/multiarch/aria2/Dockerfile","context":"dockerfiles/multiarch/aria2"}}}}
          JSON
          if nextflow_output="$(nextflow run main.nf --help --image_manifest "${missing_required_image}" -ansi-log false 2>&1)"; then
            echo "Expected missing required image manifest check to fail." >&2
            exit 1
          fi
          assert_contains "${nextflow_output}" "images.bcftools must be an object" "missing required image manifest"

      - name: Verify malformed unused manifest entries are ignored
        run: |
          ignored_extra_manifest="$(mktemp)"
          python3 - "${ignored_extra_manifest}" <<'PY'
          import json
          import sys
          from pathlib import Path

          manifest_path = Path(sys.argv[1])
          manifest = json.loads(Path("conf/images.json").read_text(encoding="utf-8"))
          manifest["images"]["unused_extra"] = {"runtime_name": "", "version": ""}
          manifest_path.write_text(json.dumps(manifest), encoding="utf-8")
          PY

          nextflow run main.nf --help --image_manifest "${ignored_extra_manifest}" -ansi-log false

      - name: Verify manifest-derived container refs on stub run
        run: |
          rm -rf work results .nextflow .nextflow.log .nextflow.log.*

          nextflow run main.nf \
            --input_file test_data/phage_smoke.csv \
            --cpus 1 \
            --email test@example.com \
            -stub-run \
            -ansi-log false

          expected_ref="docker.io/eoksen/fastp:1.3.0"
          if ! grep -R --fixed-strings --quiet "${expected_ref}" work/*/*/.command.run; then
            echo "Expected stub-run task wrapper to contain manifest-derived container ref: ${expected_ref}" >&2
            exit 1
          fi

      - name: Run image manifest regression checks
        run: scripts/test_image_manifest.sh
